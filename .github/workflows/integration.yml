name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration:
    name: E2E Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finspark
          POSTGRES_PASSWORD: finspark_test
          POSTGRES_DB: finspark_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://finspark:finspark_test@localhost:5432/finspark_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key-not-for-production
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Start backend server
        working-directory: backend
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/backend.pid
          # Wait for server to be ready
          timeout 30 bash -c 'until curl -sf http://localhost:8000/health; do sleep 1; done'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run integration tests (API)
        working-directory: backend
        run: |
          uv run pytest tests/integration/ \
            -v \
            --timeout=120 \
            -m integration

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/backend.pid) || true
