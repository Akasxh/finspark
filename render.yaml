services:
  - type: web
    name: adaptconfig-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/adaptconfig.db
    healthCheckPath: /api/v1/health
    disk:
      name: adaptconfig-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: adaptconfig-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
