services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - db-data:/app/data
    environment:
      - FINSPARK_DEBUG=true
      - FINSPARK_DATABASE_URL=sqlite+aiosqlite:///./data/adaptconfig.db
      - FINSPARK_SECRET_KEY=adaptconfig-docker-dev-secret-key-2026
      - FINSPARK_ENCRYPTION_KEY=adaptconfig-docker-dev-encryption-key-2026
      - FINSPARK_GEMINI_API_KEY=GEMINI_KEY_REDACTED
      - FINSPARK_GEMINI_MODEL=gemini-3-flash-preview
      - FINSPARK_AI_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:
  db-data:
