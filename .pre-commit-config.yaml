repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]
      - id: detect-private-key

  # Python: ruff (lint + format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Python: mypy
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: bash -c 'cd backend && uv run mypy app/ --ignore-missing-imports'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

  # Frontend: biome (lint + format)
  - repo: local
    hooks:
      - id: biome-lint
        name: biome lint
        entry: bash -c 'cd frontend && bunx biome lint --apply .'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json)$
        pass_filenames: false

      - id: biome-format
        name: biome format
        entry: bash -c 'cd frontend && bunx biome format --write .'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json)$
        pass_filenames: false

      - id: tsc
        name: TypeScript type check
        entry: bash -c 'cd frontend && bun run tsc --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

  # Secrets scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: (package-lock\.json|bun\.lockb|uv\.lock)

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, test, chore, ci, perf, build]
