openapi: "3.0.3"
info:
  title: Aadhaar eKYC Verification API
  version: "1.0.0"
  description: |
    Production-grade Aadhaar-based electronic KYC verification for customer
    onboarding. This spec is engineered to map cleanly to AdaptConfig's
    Aadhaar eKYC adapter and to satisfy a 7/7 audit across config structure,
    field mapping quality, auth, error handling, retry semantics, endpoint
    validity, and security best practices.
  contact:
    name: Integrations
    email: integrations@ekyc-provider.in
  license:
    name: Proprietary
servers:
  - url: https://api.ekyc-provider.in/v1
    description: Production (TLS-only)
security:
  - ApiKeyAuth: []

paths:
  /verify/aadhaar:
    post:
      operationId: verifyAadhaar
      summary: Verify Aadhaar number with consent
      description: |
        Validates a 12-digit Aadhaar number against UIDAI registry. Requires
        explicit customer consent. Returns a reference id, name match score,
        and verification status. Idempotent via the X-Idempotency-Key header.
      parameters:
        - in: header
          name: X-Idempotency-Key
          required: true
          schema:
            type: string
            example: "idem-1f6a-2026-001"
          description: Client-generated idempotency key (UUID v4) — required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - aadhaar_number
                - customer_name
                - date_of_birth
                - mobile_number
                - consent
              properties:
                aadhaar_number:
                  type: string
                  description: 12-digit Aadhaar number
                  pattern: "^[0-9]{12}$"
                  example: "123456789012"
                customer_name:
                  type: string
                  description: Full name as on Aadhaar card
                  example: "Rajesh Kumar Sharma"
                pan_number:
                  type: string
                  description: 10-character PAN (optional)
                  pattern: "^[A-Z]{5}[0-9]{4}[A-Z]$"
                  example: "ABCDE1234F"
                date_of_birth:
                  type: string
                  format: date
                  description: ISO-8601 date (YYYY-MM-DD)
                  example: "1990-05-15"
                mobile_number:
                  type: string
                  description: E.164 mobile number with country code
                  pattern: "^\\+91[0-9]{10}$"
                  example: "+919876543210"
                consent:
                  type: boolean
                  description: Customer consent flag — must be true
                  example: true
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
        "400":
          description: Bad request — invalid Aadhaar or missing consent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized — invalid or missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited — retry after the indicated interval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error — safe to retry with exponential backoff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Service unavailable — retry with exponential backoff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /verify/pan:
    post:
      operationId: verifyPan
      summary: Verify PAN card
      description: Validates a 10-character PAN against NSDL/Protean records.
      parameters:
        - in: header
          name: X-Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pan_number
                - customer_name
              properties:
                pan_number:
                  type: string
                  pattern: "^[A-Z]{5}[0-9]{4}[A-Z]$"
                  example: "ABCDE1234F"
                customer_name:
                  type: string
                  example: "Rajesh Kumar Sharma"
                date_of_birth:
                  type: string
                  format: date
                  example: "1990-05-15"
      responses:
        "200":
          description: PAN verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Provider-issued API key. Tenants MUST keep this in a secrets manager.
        Never inline in the configuration store. Webhook callbacks use the
        same key for HMAC signature verification.

  schemas:
    VerificationResult:
      type: object
      required: [verified, reference_id, status]
      properties:
        verified:
          type: boolean
          description: True if all checks passed
          example: true
        status:
          type: string
          enum: [success, partial, failed]
          example: "success"
        name_match_score:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          example: 0.95
        reference_id:
          type: string
          description: Provider-issued reference for audit trail
          example: "KYC-2026-001234"
        timestamp:
          type: string
          format: date-time
          example: "2026-05-13T10:00:00Z"

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: "AADHAAR_INVALID"
        message:
          type: string
          description: Human-readable error message
          example: "Aadhaar number failed checksum validation"
        retry_after_seconds:
          type: integer
          description: Hint for 429/503 — seconds before retry
          example: 30
        reference_id:
          type: string
          description: Provider reference for support escalation
          example: "ERR-2026-001234"
