[alembic]
# Path to migration environment — contains env.py, script.py.mako, versions/
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os

# Timestamp-prefixed filenames for chronological sort in version control
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC
truncate_slug_length = 40

# DATABASE_URL is read from env in env.py — do NOT hardcode credentials here.
# Fallback to SQLite for local dev / hackathon demo.
sqlalchemy.url = sqlite+aiosqlite:///./finspark_demo.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
