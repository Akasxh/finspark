target-version = "py312"
line-length = 100
src = ["src", "tests"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "TCH", # flake8-type-checking
    "ANN", # flake8-annotations
    "S",   # flake8-bandit (security)
    "N",   # pep8-naming
    "RUF", # ruff-specific rules
    "SIM", # flake8-simplify
    "PTH", # flake8-use-pathlib
    "ERA", # eradicate (commented-out code)
    "PL",  # pylint
]
ignore = [
    "ANN101", # missing type annotation for self
    "ANN102", # missing type annotation for cls
    "ANN401", # dynamically typed expressions (Any) are disallowed
    "S101",   # use of assert — needed in tests
    "S104",   # possible binding to all interfaces — OK in dev
    "PLR0913", # too many arguments — common in FastAPI route handlers
    "B008",   # do not perform function calls in default arguments — FastAPI Depends pattern
]

[lint.per-file-ignores]
"tests/**" = ["ANN", "S", "PLR2004"]
"alembic/**" = ["ANN", "ERA001"]

[lint.isort]
known-first-party = ["finspark"]
force-sort-within-sections = true

[lint.pydocstyle]
convention = "google"

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
